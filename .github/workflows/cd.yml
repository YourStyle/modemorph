name: CD - Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

# Never run two deploys at once
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy over SSH
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 40m
          script_stop: true
          script: |
            set -e
            cd /home/tashernaut/apps/modemorph
            git fetch origin main
            # Preserve server-local docker-compose edits (postgres localhost bind,
            # pg_hba hardening, adminer) across the pull.
            if ! git diff --quiet -- docker-compose.yml; then
              git stash push -m ci-autostash -- docker-compose.yml
              STASHED=1
            else
              STASHED=0
            fi
            git merge --ff-only origin/main
            if [ "$STASHED" = "1" ]; then git stash pop; fi
            chmod +x scripts/deploy.sh scripts/migrate.sh
            bash scripts/deploy.sh
