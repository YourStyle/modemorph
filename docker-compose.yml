services:
  # ──────────────────────────────────────────────
  # PostgreSQL — replaces Supabase hosted database
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: modemorph-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: modemorph
      POSTGRES_USER: modemorph
      POSTGRES_PASSWORD: ${POSTGRES_LOCAL_PASSWORD:-modemorph}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/000_users_table.sql:/docker-entrypoint-initdb.d/000_users_table.sql:ro
      - ./backend/migrations/001_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
      - ./backend/migrations/002_seed_data.sql:/docker-entrypoint-initdb.d/002_seed_data.sql:ro
      - ./backend/migrations/004_item_dislikes.sql:/docker-entrypoint-initdb.d/004_item_dislikes.sql:ro
      - ./backend/migrations/005_recommendation_logs.sql:/docker-entrypoint-initdb.d/005_recommendation_logs.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U modemorph -d modemorph"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - modemorph-network

  # ──────────────────────────────────────────────
  # FastAPI Backend — replaces Supabase + n8n logic
  # ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: modemorph-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://modemorph:${POSTGRES_LOCAL_PASSWORD:-modemorph}@postgres:5432/modemorph
      JWT_SECRET: ${SUPABASE_JWT_SECRET}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_PEPPER: ${TELEGRAM_PEPPER}
      N8N_BASE_URL: ${NEXT_PUBLIC_AI_API_URL}
      AI_SERVICE_URL: http://modemorph-ai:8000
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      YANDEX_ACCESS_KEY_ID: ${YANDEX_ACCESS_KEY_ID}
      YANDEX_SECRET_ACCESS_KEY: ${YANDEX_SECRET_ACCESS_KEY}
      YANDEX_BUCKET_NAME: ${YANDEX_BUCKET_NAME:-modemorphs3}
      ROBOKASSA_LOGIN: ${ROBOKASSA_LOGIN}
      ROBOKASSA_PASS1: ${ROBOKASSA_PASS1}
      ROBOKASSA_PASS2: ${ROBOKASSA_PASS2}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - modemorph-network

  # ──────────────────────────────────────────────
  # Next.js Frontend
  # ──────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_AI_API_URL: ${NEXT_PUBLIC_AI_API_URL}
        BACKEND_URL: http://backend:8080
    container_name: modemorph-app
    env_file:
      - .env
    environment:
      NODE_ENV: production
      BACKEND_URL: http://backend:8080
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - modemorph-network

  # ──────────────────────────────────────────────
  # Caddy reverse proxy (production only)
  # ──────────────────────────────────────────────
  caddy:
    profiles: ["prod"]
    image: caddy:2-alpine
    container_name: modemorph-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "127.0.0.1:8443:443"
      - "127.0.0.1:8443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - EMAIL=${CADDY_EMAIL:-admin@example.com}
    depends_on:
      app:
        condition: service_healthy
    networks:
      - modemorph-network

  # ──────────────────────────────────────────────
  # Cron scheduler — calls backend API endpoints
  # ──────────────────────────────────────────────
  cron:
    build:
      context: ./docker/cron
      dockerfile: Dockerfile
    container_name: modemorph-cron
    environment:
      CRON_SECRET: ${CRON_SECRET}
      TZ: Europe/Moscow
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - modemorph-network

  # ──────────────────────────────────────────────
  # AI Service (CLIP/FAISS)
  # ──────────────────────────────────────────────
  modemorph-ai:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: modemorph-ai
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://modemorph:${POSTGRES_LOCAL_PASSWORD:-modemorph}@postgres:5432/modemorph
    ports:
      - "8000:8000"
    volumes:
      - faiss_data:/data/faiss_index
      - lightgcn_data:/data/lightgcn
      - outfit_transformer_data:/data/outfit_transformer
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'python', '-c', 'import urllib.request; urllib.request.urlopen("http://127.0.0.1:8000/health")']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - modemorph-network

networks:
  modemorph-network:
    driver: bridge

volumes:
  postgres_data:
    name: modemorph_postgres_data
  caddy_data:
    name: modemorph_caddy_data
  caddy_config:
    name: modemorph_caddy_config
  faiss_data:
    name: modemorph_faiss_data
  lightgcn_data:
    name: modemorph_lightgcn_data
  outfit_transformer_data:
    name: modemorph_outfit_transformer_data
