version: "3.8"

services:
  app:  # PROD
    profiles: ["prod"]
    build:
      context: .
      dockerfile: Dockerfile
      target: runner        # финальный runtime слой (standalone)
    container_name: modemorph-app
    env_file:
      - .env
    environment:
      NODE_ENV: production
    expose:
      - "3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - modemorph-network

  caddy:  # PROD - Reverse Proxy
    profiles: ["prod"]
    image: caddy:2-alpine
    container_name: modemorph-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - EMAIL=${CADDY_EMAIL:-admin@example.com}
    depends_on:
      app:
        condition: service_healthy
    networks:
      - modemorph-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  app-dev:  # DEV
    profiles: ["dev"]
    build:
      context: .
      dockerfile: Dockerfile
      target: dev           # отдельная dev-стадия (см. Dockerfile ниже)
    container_name: modemorph-app-dev
    env_file:
      - .env
    environment:
      NODE_ENV: development
    command: ["pnpm", "dev"]  # next dev
    volumes:
      - .:/app
      - /app/node_modules     # чтобы не затирать node_modules хостовым томом
    ports:
      - "3000:3000"
    networks:
      - modemorph-network

networks:
  modemorph-network:
    driver: bridge

volumes:
  caddy_data:
    name: modemorph_caddy_data
  caddy_config:
    name: modemorph_caddy_config
