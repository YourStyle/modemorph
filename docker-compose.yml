services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_AI_API_URL: ${NEXT_PUBLIC_AI_API_URL}
    container_name: modemorph-app
    env_file:
      - .env
    environment:
      NODE_ENV: production
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - modemorph-network

  caddy:
    profiles: ["prod"]
    image: caddy:2-alpine
    container_name: modemorph-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - EMAIL=${CADDY_EMAIL:-admin@example.com}
    depends_on:
      app:
        condition: service_healthy
    networks:
      - modemorph-network


  modemorph-ai:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: modemorph-ai
    env_file:
      - .env
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
    volumes:
      - faiss_data:/data/faiss_index
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1:8000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - modemorph-network

networks:
  modemorph-network:
    driver: bridge

volumes:
  caddy_data:
    name: modemorph_caddy_data
  caddy_config:
    name: modemorph_caddy_config
  faiss_data:
    name: modemorph_faiss_data
